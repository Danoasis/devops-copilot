# Synthetic incident #2: OOMKilled -> CrashLoopBackOff (KB-003 / KB-001).
# The container allocates memory past its 32Mi limit; the kernel cgroup kills it
# with exit code 137, forever.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-worker
  labels: { app: report-worker, demo: incident }
spec:
  replicas: 1
  selector:
    matchLabels: { app: report-worker }
  template:
    metadata:
      labels: { app: report-worker }
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command: ["python", "-c"]
          args:
            - |
              import time
              print("report-worker starting: loading dataset into memory...", flush=True)
              blob = []
              while True:
                  blob.append(bytearray(8 * 1024 * 1024))  # +8MiB
                  print(f"allocated {len(blob) * 8} MiB", flush=True)
                  time.sleep(0.5)
          resources:
            requests: { memory: 16Mi, cpu: 50m }
            limits:   { memory: 32Mi, cpu: 100m }
